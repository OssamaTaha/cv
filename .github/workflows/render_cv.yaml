name: Deploy CV

on:
  push:
    branches:
      - main
    paths:
      - 'ossama_taha_cv.yaml'
      - 'Ossama_Taha_CV.pdf'
      - 'thumbnail.png'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate index.html with OG metadata
        run: |
          python3 << 'PYEOF'
          import html, os
          try:
              from ruamel.yaml import YAML
              yaml = YAML()
          except ImportError:
              import yaml

          with open("ossama_taha_cv.yaml", "r") as f:
              if 'YAML' in dir():
                  data = yaml.load(f)
              else:
                  data = yaml.safe_load(f)

          cv = data["cv"]
          name = cv["name"]
          headline = cv["headline"]
          summary_text = cv["sections"]["summary"][0].strip()

          og_desc = summary_text[:300].rsplit(" ", 1)[0] + "..." if len(summary_text) > 300 else summary_text
          safe_title = html.escape(f"{name} - {headline}")
          safe_desc = html.escape(og_desc)
          pdf_url = "https://OssamaTaha.github.io/cv/Ossama_Taha_CV.pdf"
          sha = os.environ.get("GITHUB_SHA", "dev")[:7]
          img_url = f"https://OssamaTaha.github.io/cv/thumbnail.png?v={sha}"
          page_url = "https://OssamaTaha.github.io/cv/"

          page = f"""<!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>{safe_title} - Curriculum Vitae</title>
            <meta property="og:title" content="{safe_title}">
            <meta property="og:description" content="{safe_desc}">
            <meta property="og:image" content="{img_url}">
            <meta property="og:url" content="{page_url}">
            <meta property="og:type" content="website">
            <meta name="twitter:card" content="summary_large_image">
            <meta name="twitter:title" content="{safe_title}">
            <meta name="twitter:description" content="{safe_desc}">
            <meta name="twitter:image" content="{img_url}">
            <meta http-equiv="refresh" content="0; URL={pdf_url}" />
            <script>window.location.href = "{pdf_url}";</script>
          </head>
          <body>
            <p>If you are not redirected automatically, follow this <a href="{pdf_url}">link to my CV</a>.</p>
          </body>
          </html>"""

          os.makedirs("deploy", exist_ok=True)
          with open("deploy/index.html", "w") as f:
              f.write(page)
          print("Generated index.html with OG metadata")
          PYEOF

      - name: Prepare deployment files
        run: |
          mkdir -p deploy
          cp Ossama_Taha_CV.pdf deploy/
          cp thumbnail.png deploy/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          force_orphan: true
