          - "**Solution:** Full-featured manager with Unsplash/Pexels integration, scheduling, and system tray"
          - "**Tech Stack:** Electron, JavaScript, Python, Node.js"

      - name: Order Management Bot
        link: https://github.com/OssamaTaha/Order-Management-Bot
        highlights:
          - "**Problem:** Manual order processing on social media was time-consuming and error-prone"
          - "**Process:** Developed modular Telegram bot with OCR for product code extraction"
