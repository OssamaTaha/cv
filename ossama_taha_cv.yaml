      - label: BI & Visualization
        details: Power BI, DAX, Tableau, Excel, Dash, Streamlit, Plotly
      - label: AI & Machine Learning
        details: LangChain, LangGraph, Hugging Face Transformers, Scikit-learn,
          TensorFlow, NLP, Local LLM Deployment
      - label: Data Quality & Monitoring
        details: Great Expectations, Data Validation, Schema Testing, Anomaly Detection,
          Pipeline Monitoring
      - label: Automation & Tools
        details: Git, n8n, OpenClaw, KiloCode, Hermes, Dolt, Jupyter, VS Code

    education:
