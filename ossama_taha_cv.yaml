design:
  theme: classic

  page:
    size: us-letter
    top_margin: 0.5cm
    bottom_margin: 0.5cm
    left_margin: 0.5cm
    right_margin: 0.5cm
    show_footer: false
    show_top_note: false

  colors:
    body: rgb(20, 20, 20)
    name: rgb(0, 128, 255)
    headline: rgb(80, 80, 80)
    connections: rgb(80, 80, 80)
    section_titles: rgb(0, 128, 255)
    links: rgb(100, 100, 100)
    footer: rgb(120, 120, 120)
    top_note: rgb(120, 120, 120)

  typography:
    line_spacing: 0.46em
    alignment: justified
    date_and_location_column_alignment: right
    font_family:
      body: Roboto
      name: Roboto
      headline: Roboto
      connections: Roboto
      section_titles: Roboto
    font_size:
      body: 10.51pt
      name: 28pt
      headline: 19.8pt
      connections: 10pt
      section_titles: 16.49pt
    small_caps:
      name: true
      headline: true
      connections: false
      section_titles: true
    bold:
      name: true
      headline: true
      connections: false
      section_titles: true

  links:
    underline: true
    show_external_link_icon: true

  header:
    alignment: center
    photo_width: 3.5cm
    photo_position: left
    photo_space_left: 0.4cm
    photo_space_right: 0.4cm
    space_below_name: 0.15cm
    space_below_headline: 0.15cm
    space_below_connections: 0.25cm
    connections:
      phone_number_format: E164
      hyperlink: true
      show_icons: true
      display_urls_instead_of_usernames: true
      separator: "|"
      space_between_connections: 0.4cm

  section_titles:
    type: with_full_line
    line_thickness: 0.63pt
    space_above: 0.2cm
    space_below: 0.1cm

  sections:
    allow_page_break: true
    space_between_regular_entries: 0.5em
    space_between_text_based_entries: 0.15em
    show_time_spans_in:
      - experience

  entries:
    date_and_location_width: 3.5cm
    side_space: 0.15cm
    space_between_columns: 0.08cm
    allow_page_break: true
    short_second_row: true
    summary:
      space_above: 0cm
      space_left: 0cm
    highlights:
      bullet: •
      nested_bullet: "•"
      space_left: 0.15cm
      space_above: 0cm
      space_between_items: 0cm
      space_between_bullet_and_text: 0.5em

  templates:
    top_note: '*LAST_UPDATED CURRENT_DATE*'
    single_date: MONTH_ABBREVIATION YEAR
    date_range: START_DATE – END_DATE
    time_span: HOW_MANY_YEARS YEARS HOW_MANY_MONTHS MONTHS
    one_line_entry:
      main_column: '**LABEL:** DETAILS'
    education_entry:
      main_column: |-
        **INSTITUTION**, AREA
        **DEGREE**
        HIGHLIGHTS
      degree_column: null
      date_and_location_column: |-
        LOCATION
        DATE
    normal_entry:
      main_column: |-
        **NAME**
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    experience_entry:
      main_column: |-
        **COMPANY**, POSITION
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    publication_entry:
      main_column: |-
        **TITLE**
        AUTHORS
        URL (JOURNAL)
      date_and_location_column: DATE
