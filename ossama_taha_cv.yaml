cv:
  name: Ossama Taha
  headline: BI & Data Analytics Engineer
  location: 6th of October City, Egypt
  email: ossama.y.taha@gmail.com
  phone: "+20 1026458878"
  social_networks:
    - network: LinkedIn
      username: ossamataha
    - network: GitHub
      username: OssamaTaha

  sections:
    summary:
      - >
        BI & Data Analytics professional with a B.Com in Accounting and 2+ years
        of experience building production-grade data pipelines, automated reporting
        systems, and executive dashboards. Proven track record of reducing reporting
        cycles by 10x through end-to-end automation, enabling data-driven strategic
        decisions for sales and operations teams. Combines deep business domain
        knowledge with strong technical skills in Python, SQL, PostgreSQL, Apache
        Airflow, dbt, and cloud infrastructure.

    experience:
      - company: Nile for Cables and Electronics
        position: BI & Sales Data Analyst
        location: Giza, Egypt
        start_date: 2024-11
        end_date: present
        highlights:
          - "Reduced reporting cycle from days to hours by designing and deploying a
            semi-realtime automated reporting system, directly improving sales team
            responsiveness and strategic decision-making"
          - "Led quarterly sales performance evaluations using consolidated KPIs,
            providing actionable insights that drove revenue-focused business
            decisions"
          - "Built executive dashboards supporting sales forecasting and real-time
            KPI monitoring, enabling stakeholders to track performance without
            manual data pulls"
          - "Designed end-to-end ETL pipelines using PostgreSQL and Dolt
            (version-controlled SQL database), ensuring data integrity and audit
            trail for critical financial metrics"
          - "Developed a local AI chatbot using open-source LLMs for natural
            language querying of business data, empowering non-technical
            stakeholders to self-serve analytics"

      - company: Samsung Innovation Campus
        position: Data Engineer
        location: Giza, Egypt
        start_date: 2024-07
        end_date: 2024-10
        highlights:
          - "Developed scalable data processing workflows using Apache Spark and
            Kafka, supporting business intelligence and analytical use cases"
          - "Performed exploratory data analysis and feature engineering to enable
            data-driven business insights"
          - "Deployed production data workflows on AWS cloud infrastructure (EC2,
            S3), ensuring reliable and cost-efficient operations"

    projects:
      - name: dbt Data Warehouse — Star Schema & Analytics Layer
        link: https://github.com/OssamaTaha/dbt-data-warehouse
        highlights:
          - "**Problem:** Raw operational data lacked structure for analytics, forcing manual data wrangling for every report"
          - "**Process & Solution:** Designed star schema with 15+ dbt models across staging/marts layers, SCD Type 2 tracking, incremental processing, and 99.9% data quality via automated testing"
          - "**Business Impact:** Reduced query complexity by 70%, eliminated manual data prep, enabled self-service analytics"

      - name: Atlas Analytics Platform
        link: https://github.com/OssamaTaha/atlas-analytics-platform
        highlights:
          - "**Problem:** Siloed data across departments required manual updates with no unified visibility"
          - "**Process & Solution:** Built full-stack platform with Python backend, automated ETL pipelines, role-based dashboards, deployed on AWS with CI/CD"
          - "**Business Impact:** Enabled data-driven decisions across 3 departments, reduced manual reporting by 80%"

      - name: Airflow ETL Pipeline — Multi-Source Data Orchestration
        link: https://github.com/OssamaTaha/airflow-etl-pipeline
        highlights:
          - "**Problem:** Manual API data extraction was error-prone with no scheduling or failure recovery"
          - "**Process & Solution:** Designed 4 production DAGs with task dependencies, dynamic mapping, retry logic, extracting from 3 API sources into PostgreSQL with real-time monitoring"
          - "**Business Impact:** Fully automated daily/weekly ingestion with zero manual intervention"

      - name: Agentic AI Workflow — Multi-Agent DataOps Automation
        link: https://github.com/OssamaTaha/agentic-ai-workflow
        highlights:
          - "**Problem:** Data operations required constant manual monitoring and debugging across multiple systems"
          - "**Process & Solution:** Built multi-agent system with orchestrator pattern, 5 specialized agents, tool integration, and persistent memory using LangChain/LangGraph"
          - "**Business Impact:** Cut pipeline failure resolution time by 70%, automated 90% of routine monitoring"

      - name: AWS Cloud Data Pipeline — Serverless ETL with IaC
        link: https://github.com/OssamaTaha/aws-cloud-data-pipeline
        highlights:
          - "**Problem:** On-premise infrastructure lacked scalability and cost efficiency for growing data"
          - "**Process & Solution:** S3 data lake + Glue ETL + Athena queries + Step Functions orchestration, fully deployable via Terraform IaC"
          - "**Business Impact:** 90% cost reduction vs traditional infra, sub-second query performance, zero server management"

      - name: Kafka Streaming Pipeline — Real-Time Data Processing
        link: https://github.com/OssamaTaha/kafka-streaming-pipeline
        highlights:
          - "**Problem:** Batch processing couldn't meet real-time analytics needs for stock monitoring and telemetry"
          - "**Process & Solution:** Event-driven architecture with Kafka producers, consumer groups, windowed aggregation, dead letter queues, live dashboard, and PostgreSQL sink"
          - "**Business Impact:** Sub-second data latency, automated threshold alerting, real-time operational visibility"

    skills:
      - label: BI & Data Visualization
        details: Power BI, DAX, Tableau, Excel, Streamlit, Plotly, Dash
      - label: Data Pipeline & Architecture
        details: ETL/ELT Pipelines, Apache Airflow, dbt, Apache Spark, Kafka, Data
          Modeling (Star Schema), PostgreSQL, MySQL
      - label: Cloud & Infrastructure
        details: AWS (S3, Glue, Athena, Lambda, Step Functions, EC2), Terraform, Docker,
          Docker Compose, Linux Server Administration, Nginx, GitHub Actions
          (CI/CD)
      - label: Programming & Scripting
        details: Python, SQL, Bash, JavaScript, TypeScript, HTML/CSS
      - label: AI & Machine Learning
        details: LangChain, LangGraph, Hugging Face Transformers, Scikit-learn,
          TensorFlow, NLP, Local LLM Deployment
      - label: Data Quality & Monitoring
        details: Great Expectations, Data Validation, Schema Testing, Anomaly Detection,
          Pipeline Monitoring
      - label: Automation & Tools
        details: Git, n8n, OpenClaw, KiloCode, Hermes, Dolt, Jupyter, VS Code

    education:
      - institution: Al-Azhar University
        area: Accounting & Business Management
        degree: Bachelor of Commerce
        start_date: 2019-09
        end_date: 2023-06
        highlights:
          - Self-taught in programming, data engineering, and cloud technologies
            through professional certifications and hands-on projects

    certifications:
      - name: "Google Data Analytics Professional Certificate"
        link: https://www.coursera.org/account/accomplishments/professional-cert/Y35CJWQ37Y2G
        highlights:
          - Data cleaning, analysis, visualization with spreadsheets, SQL, Tableau, and R
      - name: "IBM Data Engineer Professional Certificate"
        link: https://www.coursera.org/account/accomplishments/professional-cert/IY9SQERPCDQ7
        highlights:
          - ETL pipelines, data warehousing, big data (Spark, Hadoop, Kafka), cloud deployment
      - name: "IBM Data Science Professional Certificate"
        link: https://www.coursera.org/account/accomplishments/professional-cert/5UWB6GVS3ZWG
        highlights:
          - Machine learning, data analysis, Python, SQL, applied data science capstone projects
      - name: Samsung Innovation Campus Big Data Engineering Certificate
        highlights:
          - '"**Top Achiever (#1)** in the Big Data Engineering track"'
          - "Intensive training in big data infrastructure, distributed computing, and data engineering"
      - name: AWS Certified Data Engineer – Associate
        link: https://www.coursera.org/account/accomplishments/specialization/FBWPLGLDYABW
        highlights:
          - "S3, Glue, Athena, Lambda, Step Functions, and Terraform (In Progress)"
      - name: iMBA Business Analysis Specialization (In Progress)
        highlights:
          - "Coursera iMBA from UIUC — business process modeling, requirements engineering, data-driven decisions"

design:
  theme: classic

  page:
    size: us-letter
    top_margin: 0.3cm
    bottom_margin: 0.3cm
    left_margin: 0.4cm
    right_margin: 0.4cm
    show_footer: false
    show_top_note: false

  colors:
    body: rgb(20, 20, 20)
    name: rgb(0, 128, 255)
    headline: rgb(80, 80, 80)
    connections: rgb(80, 80, 80)
    section_titles: rgb(0, 128, 255)
    links: rgb(100, 100, 100)
    footer: rgb(120, 120, 120)
    top_note: rgb(120, 120, 120)

  typography:
    line_spacing: 0.37em
    alignment: justified
    date_and_location_column_alignment: right
    font_family:
      body: Roboto
      name: Roboto
      headline: Roboto
      connections: Roboto
      section_titles: Roboto
    font_size:
      body: 9pt
      name: 28pt
      headline: 19.8pt
      connections: 10pt
      section_titles: 14pt
    small_caps:
      name: true
      headline: true
      connections: false
      section_titles: true
    bold:
      name: true
      headline: true
      connections: false
      section_titles: true

  links:
    underline: true
    show_external_link_icon: true

  header:
    alignment: center
    photo_width: 3.5cm
    photo_position: left
    photo_space_left: 0.4cm
    photo_space_right: 0.4cm
    space_below_name: 0.15cm
    space_below_headline: 0.15cm
    space_below_connections: 0.25cm
    connections:
      phone_number_format: E164
      hyperlink: true
      show_icons: true
      display_urls_instead_of_usernames: true
      separator: "|"
      space_between_connections: 0.4cm

  section_titles:
    type: with_full_line
    line_thickness: 0.63pt
    space_above: 0.1cm
    space_below: 0.06cm

  sections:
    allow_page_break: false
    space_between_regular_entries: 0.2em
    space_between_text_based_entries: 0.15em
    show_time_spans_in:
      - experience

  entries:
    date_and_location_width: 3.5cm
    side_space: 0.15cm
    space_between_columns: 0.08cm
    allow_page_break: true
    short_second_row: true
    summary:
      space_above: 0cm
      space_left: 0cm
    highlights:
      bullet: •
      nested_bullet: "•"
      space_left: 0.15cm
      space_above: 0cm
      space_between_items: 0cm
      space_between_bullet_and_text: 0.5em

  templates:
    top_note: '*LAST_UPDATED CURRENT_DATE*'
    single_date: MONTH_ABBREVIATION YEAR
    date_range: START_DATE – END_DATE
    time_span: HOW_MANY_YEARS YEARS HOW_MANY_MONTHS MONTHS
    one_line_entry:
      main_column: '**LABEL:** DETAILS'
    education_entry:
      main_column: |-
        **INSTITUTION**, AREA
        **DEGREE**
        HIGHLIGHTS
      degree_column: null
      date_and_location_column: |-
        LOCATION
        DATE
    normal_entry:
      main_column: |-
        **NAME**
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    experience_entry:
      main_column: |-
        **COMPANY**, POSITION
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    publication_entry:
      main_column: |-
        **TITLE**
        AUTHORS
        URL (JOURNAL)
      date_and_location_column: DATE