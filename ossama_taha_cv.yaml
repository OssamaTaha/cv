cv:
  name: Ossama Taha
  headline: Business Analyst | Requirements, KPIs & Data Insights
  location: 6th of October City, Egypt
  email: ossama.y.taha@gmail.com
  phone: "+20 1026458878"
  social_networks:
    - network: LinkedIn
      username: ossamataha
    - network: GitHub
      username: OssamaTaha

  sections:
    summary:
      - >
        Business Analyst (B.Com, Accounting) with 2+ years turning business
        problems into data-backed decisions. Elicit stakeholder requirements,
        define KPIs, and deliver insights that drive revenue and efficiency.
        Hands-on in SQL, Python, and Power BI to validate requirements and
        measure outcomes independently. Pursuing CBAP & SAP BA certifications.

    experience:
      - company: Nile for Cables and Electronics
        position: BI & Sales Data Analyst
        location: Giza, Egypt
        start_date: 2024-11
        end_date: present
        highlights:
          - "Gathered sales leadership requirements and built a semi-realtime automated reporting system, cutting reporting cycles from days to hours"
          - "Facilitated quarterly business reviews, consolidating cross-functional KPIs into recommendations that drove revenue-focused decisions"
          - "Delivered interactive Power BI dashboards for sales forecasting and real-time KPI monitoring, eliminating manual pulls across 3 departments"
          - "Built audit-compliant ETL pipelines (PostgreSQL, Dolt) and an LLM-powered natural-language query tool enabling non-technical self-serve analytics"

      - company: Samsung Innovation Campus
        position: Data Engineer
        location: Giza, Egypt
        start_date: 2024-07
        end_date: 2024-10
        highlights:
          - "Defined BI/analytics requirements and built Spark + Kafka data workflows to deliver on them"
          - "Translated exploratory analysis into business recommendations and deployed production workflows on AWS (EC2, S3)"

    projects:
      - name: Customer Segmentation & Retention — E-Commerce
        link: https://github.com/OssamaTaha/ecommerce-customer-analysis
        highlights:
          - "Partnered with marketing to analyze 500K+ transactions via RFM, cohort, and purchasing-pattern analysis"
          - "**Impact:** Identified 3 segments = 68% of revenue; business case lifted retention 23%"

      - name: Executive KPI Dashboard — Sales Performance
        link: https://github.com/OssamaTaha/sales-performance-dashboard
        highlights:
          - "Elicited executive requirements; built Power BI dashboard tracking 15+ KPIs (revenue, conversion, sales velocity)"
          - "**Impact:** Replaced 2-day manual cycle with real-time access for faster territory decisions"

      - name: Churn Risk Analysis — Retention Strategy
        link: https://github.com/OssamaTaha/churn-prediction-analysis
        highlights:
          - "Modeled at-risk customers (84% accuracy, Python/scikit-learn) and quantified churn drivers"
          - "**Impact:** Presented top 5 drivers to stakeholders; enabled retention plays cutting churn ~15%"

      - name: A/B Testing & Conversion — Checkout Optimization
        link: https://github.com/OssamaTaha/ab-testing-framework
        highlights:
          - "Designed 3 A/B tests (t-tests, chi-square) for checkout flow optimization"
          - "**Impact:** Validated 18% conversion lift; $2.3M projected annual revenue — presented to product"

      - name: Data Warehouse & Self-Service — Star Schema
        link: https://github.com/OssamaTaha/dbt-data-warehouse
        highlights:
          - "Gathered user requirements; built star schema with 15+ dbt models (SCD2) at 99.9% data quality"
          - "**Impact:** Cut query complexity 70%; eliminated manual prep, enabled self-service analytics"

    skills:
      - label: Business Analysis & Requirements
        details: Elicitation, BRD/FRD, User Stories, Use Cases, Gap Analysis,
          BPMN, Stakeholder Management, UAT Coordination
      - label: Data Analysis & Business Intelligence
        details: SQL (Advanced), Python (pandas, scikit-learn), A/B & Hypothesis
          Testing, Segmentation, Cohort, RFM
      - label: Visualization & Reporting
        details: Power BI (DAX, Power Query), Tableau, Excel (Pivot, VBA), Plotly
      - label: Business & Domain Expertise
        details: KPI Development, Sales/Financial/Marketing Analytics, Churn,
          Forecasting, Business Storytelling
      - label: Data Engineering & Databases
        details: PostgreSQL, MySQL, ETL/ELT, Airflow, dbt, Star Schema, Warehousing
      - label: Cloud & Tools
        details: AWS (S3, Glue, Athena, Lambda), Docker, Git, Jupyter, BigQuery

    education:
      - institution: Al-Azhar University
        area: "Accounting & Business Management"
        degree: B.com
        start_date: 2019-09
        end_date: 2023-06
        highlights:
          - Self-taught in data analysis, SQL, Python, and BI via certifications
            and hands-on projects
          - Coursework in financial/managerial accounting, business statistics,
            financial statement analysis

    certifications:
      - name: "Certified Business Analysis Professional™ (CBAP®) Specialization"
        highlights:
          - "In Progress — Requirements elicitation, management & evaluation"
      - name: "SAP Business Analyst Professional Certificate"
        highlights:
          - "In Progress — SAP enterprise systems & business process integration"
      - name: "Google Data Analytics Professional Certificate"
        link: https://www.coursera.org/account/accomplishments/professional-cert/Y35CJWQ37Y2G
        highlights:
          - Data cleaning, analysis, visualization & storytelling (SQL, Tableau, R)
      - name: "IBM Data Science Professional Certificate"
        link: https://www.coursera.org/account/accomplishments/professional-cert/5UWB6GVS3ZWG
        highlights:
          - Machine learning, data analysis, Python & SQL capstone projects
      - name: Samsung Innovation Campus Big Data Engineering Certificate
        highlights:
          - "**Top Achiever (#1)** in the Big Data Engineering track"
      - name: Master of Business Administration (iMBA)
        highlights:
          - "University of Illinois Gies — Business Analytics, Finance, Strategy"

    languages:
      - label: Languages
        details: "Arabic: Native | English: Professional | Russian: Basic"

design:
  theme: classic

  page:
    size: us-letter
    top_margin: 0.4cm
    bottom_margin: 0.4cm
    left_margin: 0.5cm
    right_margin: 0.5cm
    show_footer: false
    show_top_note: false

  colors:
    body: rgb(20, 20, 20)
    name: rgb(0, 79, 158)
    headline: rgb(80, 80, 80)
    connections: rgb(80, 80, 80)
    section_titles: rgb(0, 79, 158)
    links: rgb(100, 100, 100)
    footer: rgb(120, 120, 120)
    top_note: rgb(120, 120, 120)

  typography:
    line_spacing: 0.46em
    alignment: justified
    date_and_location_column_alignment: right
    font_family:
      body: Roboto
      name: Roboto
      headline: Roboto
      connections: Roboto
      section_titles: Roboto
    font_size:
      body: 9.8pt
      name: 28pt
      headline: 19.8pt
      connections: 10pt
      section_titles: 15.5pt
    small_caps:
      name: true
      headline: true
      connections: false
      section_titles: true
    bold:
      name: true
      headline: true
      connections: false
      section_titles: true

  links:
    underline: true
    show_external_link_icon: true

  header:
    alignment: center
    photo_width: 3.5cm
    photo_position: left
    photo_space_left: 0.4cm
    photo_space_right: 0.4cm
    space_below_name: 0.15cm
    space_below_headline: 0.15cm
    space_below_connections: 0.25cm
    connections:
      phone_number_format: E164
      hyperlink: true
      show_icons: true
      display_urls_instead_of_usernames: true
      separator: "|"
      space_between_connections: 0.4cm

  section_titles:
    type: with_full_line
    line_thickness: 0.63pt
    space_above: 0.1cm
    space_below: 0.06cm

  sections:
    allow_page_break: true
    space_between_regular_entries: 0.25em
    space_between_text_based_entries: 0.15em
    show_time_spans_in:
      - experience

  entries:
    date_and_location_width: 3.5cm
    side_space: 0.15cm
    space_between_columns: 0.08cm
    allow_page_break: false
    short_second_row: true
    summary:
      space_above: 0cm
      space_left: 0cm
    highlights:
      bullet: •
      nested_bullet: "•"
      space_left: 0.15cm
      space_above: 0cm
      space_between_items: 0cm
      space_between_bullet_and_text: 0.5em

  templates:
    top_note: '*LAST_UPDATED CURRENT_DATE*'
    single_date: MONTH_ABBREVIATION YEAR
    date_range: START_DATE – END_DATE
    time_span: HOW_MANY_YEARS YEARS HOW_MANY_MONTHS MONTHS
    one_line_entry:
      main_column: '**LABEL:** DETAILS'
    education_entry:
      main_column: |-
        **INSTITUTION**, AREA
        **DEGREE**
        HIGHLIGHTS
      degree_column: null
      date_and_location_column: |-
        LOCATION
        DATE
    normal_entry:
      main_column: |-
        **NAME**
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    experience_entry:
      main_column: |-
        **COMPANY**, POSITION
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    publication_entry:
      main_column: |-
        **TITLE**
        AUTHORS
        URL (JOURNAL)
      date_and_location_column: DATE
