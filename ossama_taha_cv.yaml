cv:
  name: Ossama Taha
  headline: Business Analyst | Stakeholder Management & Data-Driven Insights
  location: 6th of October City, Egypt
  email: ossama.y.taha@gmail.com
  phone: "+20 1026458878"
  social_networks:
    - network: LinkedIn
      username: ossamataha
    - network: GitHub
      username: OssamaTaha

  sections:
    summary:
      - >
        Business Analyst with a B.Com in Accounting and 2+ years of
        experience at the intersection of business strategy and data. Proven
        ability to elicit stakeholder requirements, define KPIs, and translate
        complex business problems into actionable recommendations that drive
        revenue and operational efficiency. Differentiator: deep hands-on
        proficiency in SQL, Python, Power BI, and ETL — enabling me to not only
        gather requirements but also validate them against real data, prototype
        solutions, and measure outcomes independently. Currently pursuing CBAP
        and SAP Business Analyst certifications.

    experience:
      - company: Nile for Cables and Electronics
        position: BI & Sales Data Analyst
        location: Giza, Egypt
        start_date: 2024-11
        end_date: present
        highlights:
          - "Gathered requirements from sales leadership and designed a semi-realtime automated reporting system, cutting reporting cycles from days to hours and improving decision-making speed"
          - "Facilitated quarterly business reviews with cross-functional stakeholders, consolidating KPIs into actionable recommendations that drove revenue-focused decisions"
          - "Elicited executive reporting needs and delivered interactive Power BI dashboards for sales forecasting and real-time KPI monitoring, eliminating manual data pulls across 3 departments"
          - "Defined data quality requirements and built end-to-end ETL pipelines using PostgreSQL and Dolt, ensuring audit compliance for critical financial metrics"
          - "Conducted stakeholder interviews to identify data-accessibility pain points, then developed an AI-powered natural-language query tool using open-source LLMs, enabling non-technical users to self-serve analytics"

      - company: Samsung Innovation Campus
        position: Data Engineer
        location: Giza, Egypt
        start_date: 2024-07
        end_date: 2024-10
        highlights:
          - "Defined business requirements for BI and analytical use cases, then built scalable data processing workflows using Apache Spark and Kafka to deliver on them"
          - "Performed exploratory data analysis and translated findings into business recommendations presented to stakeholders for review"
          - "Documented deployment requirements and delivered production workflows on AWS (EC2, S3), ensuring reliable and cost-efficient operations"

    projects:
      - name: Customer Segmentation & Retention Strategy — E-Commerce
        link: https://github.com/OssamaTaha/ecommerce-customer-analysis
        highlights:
          - "Defined the business problem with marketing stakeholders, then analyzed 500K+ transactions using RFM analysis, cohort retention, and purchasing pattern techniques"
          - "**Business Impact:** Identified 3 high-value segments (68% of revenue), delivering a data-backed business case for targeted campaigns that improved retention by 23%"

      - name: Executive KPI Dashboard — Sales Performance Monitoring
        link: https://github.com/OssamaTaha/sales-performance-dashboard
        highlights:
          - "Elicited requirements from executive stakeholders and built an interactive Power BI dashboard tracking 15+ KPIs (revenue, conversion, sales velocity, territory performance)"
          - "**Business Impact:** Replaced a 2-day manual reporting cycle with real-time access, enabling faster decisions on underperforming territories"

      - name: Churn Risk Analysis — Business Case & Retention Strategy
        link: https://github.com/OssamaTaha/churn-prediction-analysis
        highlights:
          - "Built a predictive model (84% accuracy) using Python (scikit-learn, pandas) to identify at-risk customers and quantify churn drivers"
          - "**Business Impact:** Presented top 5 churn drivers to stakeholders, enabling proactive retention strategies that reduced churn by an estimated 15%"

      - name: A/B Testing & Conversion Optimization — E-Commerce Checkout
        link: https://github.com/OssamaTaha/ab-testing-framework
        highlights:
          - "Designed 3 A/B tests for checkout flow optimization using statistical hypothesis testing (t-tests, chi-square)"
          - "**Business Impact:** Validated 18% conversion lift, projecting $2.3M annual revenue increase — presented findings to product stakeholders"

      - name: Data Warehouse & Self-Service Analytics — Star Schema Design
        link: https://github.com/OssamaTaha/dbt-data-warehouse
        highlights:
          - "Gathered analytics requirements from business users and built a star schema with 15+ dbt models (SCD Type 2, incremental processing) achieving 99.9% data quality"
          - "**Business Impact:** Reduced query complexity by 70%, eliminated manual data prep, enabled self-service analytics"

      - name: Atlas Analytics Platform — Cross-Department BI Solution
        link: https://github.com/OssamaTaha/atlas-analytics-platform
        highlights:
          - "Gathered requirements from 3 departments and delivered a full-stack analytics platform with role-based dashboards on AWS"
          - "**Business Impact:** Enabled data-driven decisions across 3 departments, reduced manual reporting by 80%"

    skills:
      - label: Business Analysis & Requirements
        details: Requirements Elicitation, BRD/FRD Documentation, User Stories, Use
          Cases, Gap Analysis, Process Mapping (BPMN), Stakeholder Management,
          Feasibility Studies, UAT Coordination
      - label: Data Analysis & Business Intelligence
        details: SQL (Advanced), Python (pandas, NumPy, scikit-learn), Statistical
          Analysis, A/B Testing, Hypothesis Testing, Regression Analysis, Customer
          Segmentation, Cohort Analysis, RFM Analysis
      - label: Data Visualization & Reporting
        details: Power BI (DAX, Power Query), Tableau, Excel (Pivot Tables, VBA, Power
          Pivot), Plotly, Matplotlib, Seaborn
      - label: Business & Domain Expertise
        details: KPI Development, Sales Analytics, Financial Analysis, Marketing
          Analytics, Churn Analysis, Forecasting, Business Storytelling
      - label: Data Engineering & Databases
        details: PostgreSQL, MySQL, ETL/ELT Pipelines, Apache Airflow, dbt, Data
          Modeling (Star Schema), Data Warehousing
      - label: Programming & Scripting
        details: Python, SQL, Bash, JavaScript, Git
      - label: Cloud & Tools
        details: AWS (S3, Glue, Athena, Lambda), Docker, Jupyter, VS Code, Google
          Sheets, BigQuery

    education:
      - institution: Al-Azhar University
        area: "Accounting & Business Management "
        degree: B.com
        start_date: 2019-09
        end_date: 2023-06
        highlights:
          - Self-taught in data analysis, SQL, Python, and business intelligence
            through professional certifications and hands-on projects
          - Coursework in financial accounting, cost accounting, managerial
            accounting, business statistics, and financial statement analysis

    certifications:
      - name: "Certified Business Analysis Professional™ (CBAP®) Specialization"
        highlights:
          - "In Progress — Comprehensive business analysis frameworks, requirements elicitation, management, and evaluation"
      - name: "SAP Business Analyst Professional Certificate"
        highlights:
          - "In Progress — SAP enterprise systems, business process integration, and data-driven business modeling"
      - name: "Google Data Analytics Professional Certificate"
        link: https://www.coursera.org/account/accomplishments/professional-cert/Y35CJWQ37Y2G
        highlights:
          - Data cleaning, analysis, visualization, and storytelling using
            spreadsheets, SQL, Tableau, and R
      - name: "IBM Data Science Professional Certificate"
        link: https://www.coursera.org/account/accomplishments/professional-cert/5UWB6GVS3ZWG
        highlights:
          - Machine learning, data analysis, Python, SQL, and applied data
            science capstone projects
      - name: "IBM Data Engineer Professional Certificate"
        link: https://www.coursera.org/account/accomplishments/professional-cert/IY9SQERPCDQ7
        highlights:
          - ETL pipelines, data warehousing, big data technologies (Spark,
            Hadoop, Kafka), and cloud deployment
      - name: Samsung Innovation Campus Big Data Engineering Certificate
        highlights:
          - "**Top Achiever (#1)** in the Big Data Engineering track"
          - "Intensive training in big data infrastructure, distributed
            computing, and data engineering fundamentals"
      - name: Master of Business Administration (iMBA)
        highlights:
          - "University of Illinois Gies College of Business"
          - "Program includes specializations in Business Analytics, Financial
            Management, Strategic Leadership, and Managerial Economics"

    languages:
      - label: Languages
        details: "Arabic: Native | English: Professional | Russian: Basic"

design:
  theme: classic

  page:
    size: us-letter
    top_margin: 0.4cm
    bottom_margin: 0.4cm
    left_margin: 0.5cm
    right_margin: 0.5cm
    show_footer: false
    show_top_note: false

  colors:
    body: rgb(20, 20, 20)
    name: rgb(0, 79, 158)
    headline: rgb(80, 80, 80)
    connections: rgb(80, 80, 80)
    section_titles: rgb(0, 79, 158)
    links: rgb(100, 100, 100)
    footer: rgb(120, 120, 120)
    top_note: rgb(120, 120, 120)

  typography:
    line_spacing: 0.42em
    alignment: justified
    date_and_location_column_alignment: right
    font_family:
      body: Roboto
      name: Roboto
      headline: Roboto
      connections: Roboto
      section_titles: Roboto
    font_size:
      body: 9pt
      name: 28pt
      headline: 19.8pt
      connections: 10pt
      section_titles: 15pt
    small_caps:
      name: true
      headline: true
      connections: false
      section_titles: true
    bold:
      name: true
      headline: true
      connections: false
      section_titles: true

  links:
    underline: true
    show_external_link_icon: true

  header:
    alignment: center
    photo_width: 3.5cm
    photo_position: left
    photo_space_left: 0.4cm
    photo_space_right: 0.4cm
    space_below_name: 0.15cm
    space_below_headline: 0.15cm
    space_below_connections: 0.25cm
    connections:
      phone_number_format: E164
      hyperlink: true
      show_icons: true
      display_urls_instead_of_usernames: true
      separator: "|"
      space_between_connections: 0.4cm

  section_titles:
    type: with_full_line
    line_thickness: 0.63pt
    space_above: 0.1cm
    space_below: 0.06cm

  sections:
    allow_page_break: true
    space_between_regular_entries: 0.2em
    space_between_text_based_entries: 0.15em
    show_time_spans_in:
      - experience

  entries:
    date_and_location_width: 3.5cm
    side_space: 0.15cm
    space_between_columns: 0.08cm
    allow_page_break: false
    short_second_row: true
    summary:
      space_above: 0cm
      space_left: 0cm
    highlights:
      bullet: •
      nested_bullet: "•"
      space_left: 0.15cm
      space_above: 0cm
      space_between_items: 0cm
      space_between_bullet_and_text: 0.5em

  templates:
    top_note: '*LAST_UPDATED CURRENT_DATE*'
    single_date: MONTH_ABBREVIATION YEAR
    date_range: START_DATE – END_DATE
    time_span: HOW_MANY_YEARS YEARS HOW_MANY_MONTHS MONTHS
    one_line_entry:
      main_column: '**LABEL:** DETAILS'
    education_entry:
      main_column: |-
        **INSTITUTION**, AREA
        **DEGREE**
        HIGHLIGHTS
      degree_column: null
      date_and_location_column: |-
        LOCATION
        DATE
    normal_entry:
      main_column: |-
        **NAME**
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    experience_entry:
      main_column: |-
        **COMPANY**, POSITION
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    publication_entry:
      main_column: |-
        **TITLE**
        AUTHORS
        URL (JOURNAL)
      date_and_location_column: DATE
