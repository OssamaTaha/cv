cv:
  name: Ossama Taha
  headline: Data Engineer
  location: 6th of October City, Egypt
  email: ossama.y.taha@gmail.com
  phone: "+20 1026458878"
  social_networks:
    - network: LinkedIn
      username: ossamataha
    - network: GitHub
      username: OssamaTaha

  sections:
    summary:
      - >
        Data Engineer with 2+ years building production ETL pipelines,
        orchestrated data workflows, and real-time streaming systems. Proficient
        in Python, SQL, Apache Airflow, Kafka, dbt, and AWS. Proven track record
        of reducing reporting time by 10x through automation and building
        scalable data platforms from scratch.

    experience:
      - company: Nile for Cables and Electronics
        position: BI & Sales Data Analyst
        location: Giza, Egypt
        start_date: 2024-11
        end_date: present
        highlights:
          - "Engineered a semi-realtime automated reporting system replacing
            Power BI, improving reporting speed by 10x"
          - "Designed end-to-end ETL pipelines using PostgreSQL and Dolt
            (version-controlled SQL database)"
          - "Built executive dashboards supporting sales forecasting and
            strategic business decisions"
          - "Led quarterly sales performance evaluations using consolidated KPIs"
          - "Developed a local AI chatbot using open-source Hugging Face models
            for natural language data querying"

      - company: Samsung Innovation Campus
        position: Big Data Engineer
        location: Giza, Egypt
        start_date: 2024-07
        end_date: 2024-10
        highlights:
          - "Built scalable ETL pipelines using Apache Spark, Kafka, and Hadoop
            ecosystem"
          - "Performed exploratory data analysis and feature engineering for
            analytical use cases"
          - "Deployed data workflows on AWS EC2 and S3 for production
            environments"

    projects:
      - name: Airflow ETL Pipeline — Multi-Source Data Orchestration
        link: https://github.com/OssamaTaha/airflow-etl-pipeline
        highlights:
          - "**Problem:** Manual data extraction from multiple APIs was
            error-prone and lacked scheduling, monitoring, or failure recovery"
          - "**Process:** Designed 4 production DAGs with task dependencies,
            dynamic task mapping, XCom data passing, and automated retry logic"
          - "**Solution:** End-to-end orchestrated pipeline extracting from 3
            API sources, transforming in staging, and loading into PostgreSQL"
          - "**Tech Stack:** Apache Airflow, Docker, PostgreSQL, Python,
            Streamlit, GitHub Actions"
          - "**Business Impact:** Fully automated daily/weekly data ingestion
            with monitoring dashboard, zero manual intervention required"

      - name: Kafka Streaming Pipeline — Real-Time Data Processing
        link: https://github.com/OssamaTaha/kafka-streaming-pipeline
        highlights:
          - "**Problem:** Batch processing couldn't meet real-time analytics
            requirements for stock monitoring and IoT telemetry"
          - "**Process:** Built event-driven architecture with Kafka producers,
            consumer groups, windowed aggregation, and dead letter queues"
          - "**Solution:** Real-time pipeline processing 1000+ events/sec with
            live dashboard, alerting, and PostgreSQL sink"
          - "**Tech Stack:** Apache Kafka, Docker, Python, PostgreSQL,
            Streamlit, Pydantic, GitHub Actions"
          - "**Business Impact:** Sub-second data latency, automated alerting on
            threshold breaches, real-time operational visibility"

      - name: AWS Cloud Data Pipeline — Serverless ETL with IaC
        link: https://github.com/OssamaTaha/aws-cloud-data-pipeline
        highlights:
          - "**Problem:** On-premise data infrastructure lacked scalability,
            reliability, and cost efficiency for growing data volumes"
          - "**Process:** Designed S3 data lake architecture with Glue ETL,
            Athena serverless queries, and Step Functions orchestration"
          - "**Solution:** Fully serverless pipeline with Terraform IaC — deploy
            entire infrastructure with single command"
          - "**Tech Stack:** AWS (S3, Glue, Athena, Lambda, Step Functions,
            CloudWatch), Terraform, Python, PySpark, Docker"
          - "**Business Impact:** 90% cost reduction vs traditional infra,
            auto-scaling, zero server management, sub-second query performance"

      - name: dbt Data Warehouse — Star Schema Design & Transformation
        link: https://github.com/OssamaTaha/dbt-data-warehouse
        highlights:
          - "**Problem:** Raw operational data lacked dimensional structure for
            efficient analytics and BI tool consumption"
          - "**Process:** Designed star schema with fact and dimension tables,
            built 15+ dbt models across staging/intermediate/marts layers"
          - "**Solution:** Production-grade data warehouse with automated
            testing, documentation, SCD Type 2 tracking, and incremental
            processing"
          - "**Tech Stack:** dbt-core, PostgreSQL, Docker, Jinja, Python, Faker,
            Streamlit, GitHub Actions"
          - "**Business Impact:** Reduced query complexity by 70%, enabled
            self-service analytics, 99.9% data quality via dbt tests"

      - name: Agentic AI Workflow — Multi-Agent DataOps Automation
        link: https://github.com/OssamaTaha/agentic-ai-workflow
        highlights:
          - "**Problem:** Data engineering operations required manual
            monitoring, debugging, and intervention across multiple systems"
          - "**Process:** Built multi-agent system with orchestrator pattern, 5
            specialized agents, tool integration, and persistent memory"
          - "**Solution:** Natural language interface for DataOps — agents
            autonomously monitor pipelines, run quality checks, debug failures"
          - "**Tech Stack:** LangChain, LangGraph, Python, PostgreSQL,
            Streamlit, Docker, OpenAI/Ollama, GitHub Actions"
          - "**Business Impact:** Reduced mean-time-to-resolution for pipeline
            failures by 70%, automated 90% of routine monitoring tasks"

      - name: Atlas Analytics Platform
        link: https://github.com/OssamaTaha/atlas-analytics-platform
        highlights:
          - "**Problem:** Enterprise needed unified analytics platform for
            multi-department data visibility"
          - "**Process:** Built full-stack platform with Python backend,
            real-time ETL pipelines, and interactive dashboards"
          - "**Solution:** Deployed production system with role-based access
            control, automated data sync, and real-time reporting"
          - "**Tech Stack:** Python, PostgreSQL, Docker, AWS EC2/S3, Streamlit"
          - "**Business Impact:** Enabled data-driven decisions across 3
            departments, reduced manual reporting by 80%"

    skills:
      - label: Programming & Scripting
        details: Python, SQL, Bash, JavaScript, TypeScript, HTML/CSS
      - label: Data Engineering
        details: ETL/ELT Pipelines, Apache Airflow, Apache Spark, Apache Kafka, Hadoop,
